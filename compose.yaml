services:
  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/priceradar.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: priceradar-compose-secret-2026
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started

  worker:
    build: .
    command: python -m app.worker
    environment:
      DATABASE_URL: sqlite:///./data/priceradar.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: priceradar-compose-secret-2026
      REFRESH_INTERVAL_SECONDS: 20
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
